services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sevenr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sevenr_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sevenr}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sevenr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sevenr}:${POSTGRES_PASSWORD:-sevenr_dev}@db:5432/${POSTGRES_DB:-sevenr}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      VALORANT_REGION: ${VALORANT_REGION:-eu}
      TEAM_NAME: ${TEAM_NAME:-7R}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
