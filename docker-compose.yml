services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: 7r-app
    working_dir: /app
    command: sh -c "npm i && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - DATABASE_URL=postgresql://sevenr:sevenr_dev@db:5432/sevenr
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      db:
        condition: service_healthy

  studio:
    image: node:22-alpine
    container_name: 7r-studio
    working_dir: /app
    command: sh -c "npx prisma generate && npx prisma studio --browser none"
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://sevenr:sevenr_dev@db:5432/sevenr
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: 7r-db
    environment:
      POSTGRES_USER: sevenr
      POSTGRES_PASSWORD: sevenr_dev
      POSTGRES_DB: sevenr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sevenr"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  node_modules:
  next_cache:
  pg_data:
