services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: vhub-app
    working_dir: /app
    command: sh -c "npm i && npx prisma db push --accept-data-loss && npx prisma generate && npx next dev --inspect=0.0.0.0:9229 --turbo"
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - DATABASE_URL=postgresql://vhub:vhub_dev@db:5432/vhub
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  studio:
    image: node:22-alpine
    container_name: vhub-studio
    working_dir: /app
    command: sh -c "npx prisma generate && npx prisma studio --browser none --port 5555"
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://vhub:vhub_dev@db:5432/vhub
      - PRISMA_STUDIO_HOSTNAME=0.0.0.0
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: vhub-db
    environment:
      POSTGRES_USER: vhub
      POSTGRES_PASSWORD: vhub_dev
      POSTGRES_DB: vhub
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vhub" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  node_modules:
  next_cache:
  pg_data:
