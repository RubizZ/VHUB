services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 7r-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      # --- Configuración de Desarrollo ---
      NODE_ENV: development
      DATABASE_URL: postgresql://sevenr:sevenr_dev@db:5432/sevenr
      PRISMA_CLIENT_ENGINE_TYPE: library
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      VALORANT_REGION: "eu"
      
      # ESTO ES CLAVE PARA HOT RELOAD EN DOCKER/WINDOWS
      WATCHPACK_POLLING: "true"
      
      # --- Secretos Externos ---
      RIOT_API_KEY: ${RIOT_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}

  db:
    image: postgres:16-alpine
    container_name: 7r-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sevenr
      POSTGRES_PASSWORD: sevenr_dev
      POSTGRES_DB: sevenr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sevenr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
