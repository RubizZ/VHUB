services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: vhub-app
    working_dir: /app
    command: sh -c "npm i && npx prisma db push --accept-data-loss && npx prisma generate && npx next dev --inspect=0.0.0.0:9229 ${NEXT_DEV_FLAG:---webpack}"
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - DATABASE_URL=postgresql://vhub:vhub_dev@db:5432/vhub
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  studio:
    image: node:22-alpine
    container_name: vhub-studio
    working_dir: /app
    command: sh -c "npx prisma generate && npx prisma studio --browser none --port 5555"
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://vhub:vhub_dev@db:5432/vhub
      - PRISMA_STUDIO_HOSTNAME=0.0.0.0
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: vhub-db
    environment:
      POSTGRES_USER: vhub
      POSTGRES_PASSWORD: vhub_dev
      POSTGRES_DB: vhub
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vhub" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: vhub-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  node_modules:
  next_cache:
  pg_data:
  minio_data:
